const STATUS_COLORS={

// ══════════════════════════════════════════════════════
// FIREBASE CONFIG — cole suas credenciais aqui
// ══════════════════════════════════════════════════════
const FIREBASE_CONFIG = const firebaseConfig = {
  apiKey: "AIzaSyB...",
  authDomain: "teste1-abc.firebaseapp.com",
  projectId: "teste1-abc",
  storageBucket: "teste1-abc.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
};
};
const FIREBASE_PRONTO = FIREBASE_CONFIG.projectId !== "COLE_AQUI";

// ── STORAGE LOCAL (fallback offline) ──
function lsLoad(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── FIREBASE SDK (carregado dinamicamente) ──
let db = null;
async function iniciarFirebase(){
  if(!FIREBASE_PRONTO) return false;
  try {
    const {initializeApp,getApps} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const {getFirestore,doc,getDoc,setDoc,onSnapshot,collection} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    if(!getApps().length) initializeApp(FIREBASE_CONFIG);
    db = getFirestore();
    window._fs = {doc,getDoc,setDoc,onSnapshot,collection};
    return true;
  } catch(e) {
    console.warn("Firebase falhou:", e);
    return false;
  }
}

// ── SALVAR NO FIREBASE ──
async function fbSalvar(colecao, dados) {
  if(!db || !window._fs) return;
  try {
    await window._fs.setDoc(window._fs.doc(db, "otica", colecao), { dados, ts: Date.now() });
  } catch(e) { console.warn("Firebase write error:", e); }
}

// ── CARREGAR DO FIREBASE ──
async function fbCarregar(colecao) {
  if(!db || !window._fs) return null;
  try {
    const snap = await window._fs.getDoc(window._fs.doc(db, "otica", colecao));
    return snap.exists() ? snap.data().dados : null;
  } catch(e) { return null; }
}

// ── ESCUTAR MUDANÇAS EM TEMPO REAL ──
function fbEscutar() {
  if(!db || !window._fs) return;
  const cols = ["produtos","vendas","pedidos","config","marcas","osCounter"];
  cols.forEach(col => {
    window._fs.onSnapshot(window._fs.doc(db,"otica",col), snap => {
      if(!snap.exists()) return;
      const dados = snap.data().dados;
      if(col==="produtos" && JSON.stringify(dados)!==JSON.stringify(state.produtos)) { state.produtos=dados; render(); }
      if(col==="vendas"   && JSON.stringify(dados)!==JSON.stringify(state.vendas))   { state.vendas=dados;   render(); }
      if(col==="pedidos"  && JSON.stringify(dados)!==JSON.stringify(state.pedidos))  { state.pedidos=dados;  render(); }
      if(col==="marcas"   && JSON.stringify(dados)!==JSON.stringify(state.marcasLente)){ state.marcasLente=dados; render(); }
      if(col==="config"   && JSON.stringify(dados)!==JSON.stringify(state.config))   { state.config=dados;   render(); }
      if(col==="osCounter"&& dados!==state.osCounter) { state.osCounter=dados; }
    });
  });
}


// ── STATE ──
let state={
  tela:"loading",aba:"dashboard",usuario:null,
  produtos:PRODUTOS_INICIAL,vendas:[],pedidos:[],

    desconto:{tipo:"R$",valor:""},
    lente:{marca:"",tipoBase:"",indice:"",od:{esf:"",cil:"",eixo:"",dnp:""},oe:{esf:"",cil:"",eixo:"",dnp:""},adicao:"",obs:"",precoLente:""},
  },
  vendaArmacaoItem:{produtoId:"",quantidade:1},
  vendaArmacaoMarca:"",
  novoProduto:{nome:"",categoria:"Armação",estoque:0,preco:0,ncm:"90041000",marca:"",cor:"",material:""},
  novaMarca:"",
  showNovoProduto:false,showNovasMarcas:false,
  loginSel:null,loginSenha:"",loginErro:"",showSenha:false,
  toast:null,modalPedido:null,emitindoNF:false,osCounter:0,
  estoqueFilter:"Todos",
  // OCR
  ocrCarregando:false,ocrImgPreview:null,
  // Clientes
  clienteDetalhe:null,
};

// ── RENDER ──
function render(){
  const{tela,toast}=state;
  let html="";
  if(tela==="loading") html=`<div class="loader"><div style="font-size:48px">☁️</div><div style="color:#C9A84C;font-size:16px;letter-spacing:2px">CARREGANDO...</div></div>`;
  else if(tela==="login") html=renderLogin();
  else html=renderApp();
  if(toast) html+=`<div class="toast ${toast.tipo}">${esc(toast.msg)}</div>`;
  document.getElementById("app").innerHTML=html;
}
function showToast(msg,tipo="ok"){state.toast={msg,tipo};render();setTimeout(()=>{state.toast=null;render();},3000)}

// ── PERSISTENCE ──
async function carregarDados(){
  // 1. carrega local primeiro (instantâneo)
  const p=lsLoad("otica:produtos"),v=lsLoad("otica:vendas"),ped=lsLoad("otica:pedidos"),
        cfg=lsLoad("otica:config"),ml=lsLoad("otica:marcas"),os=lsLoad("otica:osCounter");
  if(p)state.produtos=p; if(v)state.vendas=v; if(ped)state.pedidos=ped;
  if(cfg)state.config=cfg; if(ml)state.marcasLente=ml; if(os!=null)state.osCounter=os;

  // 2. se Firebase configurado, puxa nuvem e sobrescreve
  if(FIREBASE_PRONTO){
    state.tela="loading"; render();
    const ok = await iniciarFirebase();
    if(ok){
      const [fp,fv,fped,fcfg,fml,fos] = await Promise.all([
        fbCarregar("produtos"), fbCarregar("vendas"), fbCarregar("pedidos"),
        fbCarregar("config"),   fbCarregar("marcas"), fbCarregar("osCounter"),
      ]);
      if(fp)  { state.produtos=fp;       lsSave("otica:produtos",fp); }
      if(fv)  { state.vendas=fv;         lsSave("otica:vendas",fv); }
      if(fped){ state.pedidos=fped;      lsSave("otica:pedidos",fped); }
      if(fcfg){ state.config=fcfg;       lsSave("otica:config",fcfg); }
      if(fml) { state.marcasLente=fml;   lsSave("otica:marcas",fml); }
      if(fos!=null){ state.osCounter=fos; lsSave("otica:osCounter",fos); }
      fbEscutar(); // escuta mudanças em tempo real
    }
  }
}

async function salvarDados(){
  // salva local sempre
  lsSave("otica:produtos",state.produtos); lsSave("otica:vendas",state.vendas);
  lsSave("otica:pedidos",state.pedidos);   lsSave("otica:config",state.config);
  lsSave("otica:marcas",state.marcasLente); lsSave("otica:osCounter",state.osCounter);
  // salva Firebase se configurado
  if(FIREBASE_PRONTO && db){
    await Promise.all([
      fbSalvar("produtos",  state.produtos),
      fbSalvar("vendas",    state.vendas),
      fbSalvar("pedidos",   state.pedidos),
      fbSalvar("config",    state.config),
      fbSalvar("marcas",    state.marcasLente),
      fbSalvar("osCounter", state.osCounter),
    ]);
  }
}
function proximaOS(){
  state.osCounter=(state.osCounter||0)+1;
  return String(state.osCounter).padStart(4,"0");
}

// ── HELPERS ──
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function now(){const d=new Date();return{data:d.toLocaleDateString("pt-BR"),hora:d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}}
function tagHTML(s){const c=STATUS_COLORS[s]||{bg:"#eee",text:"#333",dot:"#999"};return`<span class="tag" style="background:${c.bg};color:${c.text}"><span class="dot" style="background:${c.dot}"></span>${esc(s)}</span>`}
function field(label,inputHTML){return`<div class="field"><label>${label}</label>${inputHTML}</div>`}
function inp(id,val,ph="",type="text"){return`<input id="${id}" type="${type}" value="${esc(String(val))}" placeholder="${ph}" oninput="onInp(event,'${id}')"/>`}
function selHTML(id,val,opts){const o=opts.map(o=>{const v=typeof o==="object"?o.value:o,l=typeof o==="object"?o.label:o;return`<option value="${esc(v)}"${val==v?" selected":""}>${esc(l)}</option>`}).join("");return`<select id="${id}" onchange="onSel(event,'${id}')">${o}</select>`}
function isAdmin(){return state.usuario&&state.usuario.cargo==="Admin"}

function calcTotal(v){
  const arm=v.armacaoItems.reduce((s,i)=>s+i.subtotal,0);
  const lente=v.temLente?Number(v.lente.precoLente||0):0;
  const bruto=arm+lente;
  if(!v.desconto||!v.desconto.valor)return bruto;
  const d=Number(v.desconto.valor)||0;
  if(v.desconto.tipo==="%") return Math.max(0,bruto-(bruto*d/100));
  return Math.max(0,bruto-d);
}
function calcDesconto(v){
  const arm=v.armacaoItems.reduce((s,i)=>s+i.subtotal,0);
  const lente=v.temLente?Number(v.lente.precoLente||0):0;
  const bruto=arm+lente;
  const d=Number(v.desconto?.valor||0);
  if(!d)return 0;
  if(v.desconto.tipo==="%")return bruto*d/100;
  return Math.min(d,bruto);
}
function tipoLenteCompleto(l){
  const p=[l.marca,l.tipoBase,l.indice?`${l.indice}`:""].filter(Boolean).join(" ");
  return p||"Lente";
}

// ── INPUT HANDLERS ──
window.onInp=function(e,id){
  const v=e.target.value,pts=id.split(".");
  const set=(obj,keys,val)=>{if(keys.length===1)obj[keys[0]]=val;else set(obj[keys[0]],keys.slice(1),val)};
  if(pts[0]==="venda")set(state.venda,pts.slice(1),v);
  else if(pts[0]==="vendaArmacaoItem")set(state.vendaArmacaoItem,pts.slice(1),v);
  else if(pts[0]==="novoProduto")set(state.novoProduto,pts.slice(1),v);
  else if(pts[0]==="config")set(state.config,pts.slice(1),v);
  else if(id==="novaMarca")state.novaMarca=v;
  else if(id==="vendaArmacaoMarca"){state.vendaArmacaoMarca=v;state.vendaArmacaoItem.produtoId="";}
  else if(id==="estoqueFilter")state.estoqueFilter=v;
};
window.onSel=function(e,id){window.onInp(e,id);render()};
window.onLoginInp=function(e){state.loginSenha=e.target.value;state.loginErro=""};

window.login=function(){
  if(!state.loginSel)return state.loginErro="Selecione um usuário",render();
  const u=USUARIOS.find(u=>u.id===state.loginSel);
  // admin precisa de senha, atendentes não
  if(u.senha!==null&&u.senha!==state.loginSenha)return state.loginErro="Senha incorreta!",render();
  state.usuario=u;state.tela="app";state.loginErro="";render();
};

window.onLoginSel=function(id){
  state.loginSel=id;state.loginSenha="";state.loginErro="";

  if(u&&u.senha===null){state.usuario=u;state.tela="app";state.loginErro="";}

window.addArmacaoItem=function(){
  const prod=state.produtos.find(p=>p.id===Number(state.vendaArmacaoItem.produtoId));
  if(!prod)return showToast("Selecione um produto","err");
  const qtd=Number(state.vendaArmacaoItem.quantidade);
  if(qtd>prod.estoque)return showToast("Estoque insuficiente!","err");
  state.venda.armacaoItems=[...state.venda.armacaoItems,{...prod,quantidade:qtd,subtotal:prod.preco*qtd}];
  state.vendaArmacaoItem={produtoId:"",quantidade:1};render();
};
window.removerArmacaoItem=function(i){state.venda.armacaoItems=state.venda.armacaoItems.filter((_,j)=>j!==i);render()};

window.finalizarVenda=async function(){
  const v=state.venda;
  if(!v.cliente)return showToast("Informe o nome do cliente","err");
  if(!v.temArmacao&&!v.temLente)return showToast("Selecione armação e/ou lente","err");
  if(v.temArmacao&&!v.armacaoItems.length)return showToast("Adicione ao menos um produto","err");
  if(v.temLente&&!v.lente.tipoBase)return showToast("Selecione o tipo da lente","err");
  const{data,hora}=now();
  const total=calcTotal(v);
  const desconto=calcDesconto(v);
  const venda={...v,id:Date.now(),data,hora,total,desconto,funcionario:state.usuario.nome,nfStatus:"pendente",nfChave:""};
  if(v.temArmacao){
    state.produtos=state.produtos.map(p=>{
      const item=venda.armacaoItems.find(i=>i.id===p.id);
      return item?{...p,estoque:p.estoque-item.quantidade}:p;
    });
  }
  if(v.temLente){
    const os=proximaOS();
    state.pedidos=[{
      id:Date.now()+1,data,hora,os,
      cliente:v.cliente,telefone:v.telefone,
      ...v.lente,
      tipoLenteCompleto:tipoLenteCompleto(v.lente),
      status:"Pedido Realizado",
      funcionario:state.usuario.nome,
      vendaId:venda.id,
    },...state.pedidos];
  }
  state.vendas=[venda,...state.vendas];
  state.venda={cliente:"",cpf:"",telefone:"",pagamento:"Dinheiro",temArmacao:false,temLente:false,armacaoItems:[],desconto:{tipo:"R$",valor:""},lente:{marca:"",tipoBase:"",indice:"",od:{esf:"",cil:"",eixo:"",dnp:""},oe:{esf:"",cil:"",eixo:"",dnp:""},adicao:"",obs:"",precoLente:""}};
  state.vendaArmacaoMarca="";
  salvarDados();
  showToast(`✓ Venda R$ ${total.toFixed(2)} registrada!${desconto>0?" (desc. R$"+desconto.toFixed(2)+")":""}`);
  if(state.config.nfceAtivo&&state.config.focusToken)emitirNFCe(venda);
};

// ── NFC-e ──
async function emitirNFCe(venda){
  state.emitindoNF=true;render();
  const cfg=state.config;
  const itens=[];
  if(venda.temArmacao){
    venda.armacaoItems.forEach(item=>{
      itens.push({numero_item:itens.length+1,codigo_produto:String(item.id),descricao:item.nome,ncm:item.ncm||"90041000",cfop:"5102",unidade_comercial:"UN",quantidade_comercial:item.quantidade,valor_unitario_comercial:item.preco,valor_unitario_tributacao:item.preco,quantidade_tributavel:item.quantidade,unidade_tributavel:"UN",valor_bruto:item.subtotal,icms_origem:0,icms_modalidade_determinacao_bc:3,icms_aliquota:0,icms_valor:0,pis_modalidade:7,cofins_modalidade:7});
    });
  }
  if(venda.temLente){
    const pl=Number(venda.lente.precoLente||0);
    itens.push({numero_item:itens.length+1,codigo_produto:"LENTE001",descricao:`Lente ${tipoLenteCompleto(venda.lente)}`,ncm:"90015000",cfop:"5102",unidade_comercial:"PAR",quantidade_comercial:1,valor_unitario_comercial:pl,valor_unitario_tributacao:pl,quantidade_tributavel:1,unidade_tributavel:"PAR",valor_bruto:pl,icms_origem:0,icms_modalidade_determinacao_bc:3,icms_aliquota:0,icms_valor:0,pis_modalidade:7,cofins_modalidade:7});
  }
  const pgMap={"Dinheiro":1,"Cartão Débito":4,"Cartão Crédito":3,"PIX":17,"Parcelado":3};
  const payload={natureza_operacao:"VENDA",data_emissao:new Date().toISOString(),data_saida_entrada:new Date().toISOString(),tipo_documento:1,finalidade_emissao:1,cnpj_emitente:cfg.cnpjEmitente.replace(/\D/g,""),nome_emitente:cfg.razaoSocial,nome_destinatario:venda.cliente||"CONSUMIDOR",cpf_destinatario:venda.cpf?venda.cpf.replace(/\D/g,""):undefined,indicador_inscricao_estadual_destinatario:9,modalidade_frete:9,items:itens,forma_pagamento:[{forma_pagamento:pgMap[venda.pagamento]||1,valor_pagamento:venda.total}]};
  try{
    const ref="otica"+venda.id;
    const resp=await fetch(`https://homologacao.focusnfe.com.br/v2/nfce?ref=${ref}`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Token "+cfg.focusToken},body:JSON.stringify(payload)});
    const data=await resp.json();
    if(resp.status===201||resp.status===200){
      state.vendas=state.vendas.map(v=>v.id===venda.id?{...v,nfStatus:"emitida",nfChave:data.chave_nfe||"",nfDanfe:data.danfe_nfce_url||""}:v);
      salvarDados();showToast("✅ NFC-e emitida!","ok");
    }else{
      state.vendas=state.vendas.map(v=>v.id===venda.id?{...v,nfStatus:"erro",nfErro:data.mensagem||"Erro"}:v);
      salvarDados();showToast("⚠️ Erro NFC-e: "+(data.mensagem||"verifique config"),"err");
    }
  }catch(e){
    state.vendas=state.vendas.map(v=>v.id===venda.id?{...v,nfStatus:"erro",nfErro:"Falha de conexão"}:v);
    salvarDados();showToast("❌ Falha ao emitir NFC-e","err");
  }
  state.emitindoNF=false;render();
}
window.reemitirNFCe=function(id){const v=state.vendas.find(v=>v.id===id);if(v)emitirNFCe(v)};

window.abrirOCR=function(){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const b64=ev.result.split(",")[1];
      const mime=file.type||"image/jpeg";
      state.ocrImgPreview=ev.result;
      state.ocrCarregando=true;render();
      try{
        const resp=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-20250514",
            max_tokens:1000,
            messages:[{role:"user",content:[
              {type:"image",source:{type:"base64",media_type:mime,data:b64}},
              {type:"text",text:`Você é um leitor de receitas ópticas. Analise esta imagem e extraia as informações.
Responda APENAS com JSON válido, sem markdown, sem explicações, neste formato exato:
{
  "nome_cliente": "nome se encontrado ou vazio",
  "od_esf": "valor ou vazio",
  "od_cil": "valor ou vazio",
  "od_eixo": "valor ou vazio",
  "od_dnp": "valor ou vazio",
  "oe_esf": "valor ou vazio",
  "oe_cil": "valor ou vazio",
  "oe_eixo": "valor ou vazio",
  "oe_dnp": "valor ou vazio",
  "adicao": "valor ou vazio"
}
Use os campos OD (olho direito) e OE (olho esquerdo). Converta vírgulas para vírgulas. Se não encontrar algum campo, deixe vazio.`}
            ]}]
          })
        });
        const data=await resp.json();
        const txt=data.content?.[0]?.text||"{}";
        const clean=txt.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(clean);
        // preencher form
        if(parsed.nome_cliente)state.venda.cliente=parsed.nome_cliente;
        if(!state.venda.temLente){state.venda.temLente=true;}
        const l=state.venda.lente;
        if(parsed.od_esf)l.od.esf=parsed.od_esf;
        if(parsed.od_cil)l.od.cil=parsed.od_cil;
        if(parsed.od_eixo)l.od.eixo=parsed.od_eixo;
        if(parsed.od_dnp)l.od.dnp=parsed.od_dnp;
        if(parsed.oe_esf)l.oe.esf=parsed.oe_esf;
        if(parsed.oe_cil)l.oe.cil=parsed.oe_cil;
        if(parsed.oe_eixo)l.oe.eixo=parsed.oe_eixo;
        if(parsed.oe_dnp)l.oe.dnp=parsed.oe_dnp;
        if(parsed.adicao)l.adicao=parsed.adicao;
        state.ocrCarregando=false;
        showToast("✓ Receita lida com sucesso!");
      }catch(err){
        state.ocrCarregando=false;
        showToast("Erro ao ler receita: "+err.message,"err");
      }
      render();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
};

function calcClientes(){
  const map={};
  state.vendas.forEach(v=>{
    const chave=(v.cliente||"?").trim().toLowerCase();
    if(!map[chave])map[chave]={nome:v.cliente||"?",compras:[],total:0,ultimaData:"",ultimaDataRaw:0};
    map[chave].compras.push(v);
    map[chave].total+=v.total||0;
    // data raw para ordenação
    const [d,m,a]=v.data.split("/");
    const raw=Number(a+m+d)||0;
    if(raw>map[chave].ultimaDataRaw){map[chave].ultimaDataRaw=raw;map[chave].ultimaData=v.data;}
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
}
window.abrirCliente=function(nome){
  const chave=nome.trim().toLowerCase();
  const clientes=calcClientes();
  state.clienteDetalhe=clientes.find(c=>c.nome.trim().toLowerCase()===chave)||null;
  render();
};

// RENDER: MURAL
// ════════════════════════════════════════════════
function renderMural(){
  const{pedidos,modalPedido}=state;
  const muralHTML=`<div class="page">
    <div class="page-title">Mural de Pedidos</div>
    <div class="page-sub">${pedidos.filter(p=>p.status!=="Concluído").length} pedido(s) em aberto</div>
    <div class="mural">
      ${STATUS_LIST.map(col=>{
        const cards=pedidos.filter(p=>p.status===col);
        const c=STATUS_COLORS[col];
        return`<div class="mural-col">
          <div class="mural-col-title" style="color:${c.dot}"><span class="dot" style="background:${c.dot}"></span>${esc(col)} <span style="color:#444">(${cards.length})</span></div>
          ${cards.length===0?`<div style="font-size:12px;color:#333;text-align:center;padding:16px">Vazio</div>`:""}
          ${cards.map(p=>`<div class="mural-card" onclick="abrirModalPedido(${p.id})">
            ${p.os?`<div style="font-size:10px;color:#C9A84C;letter-spacing:2px;margin-bottom:3px;font-weight:bold">O.S. #${esc(p.os)}</div>`:""}
            <div style="font-weight:bold;font-size:13px;margin-bottom:4px">${esc(p.cliente)}</div>
            <div style="font-size:11px;color:#888">${esc(p.tipoLenteCompleto||p.tipoBase||"")} · ${p.data}</div>
            <div style="font-size:11px;color:#C9A84C;margin-top:3px">por ${esc(p.funcionario)}</div>
          </div>`).join("")}
        </div>`;
      }).join("")}
    </div>
  </div>`;
  if(!modalPedido) return muralHTML;
  const p=modalPedido;
  const modal=`<div class="modal-bg" onclick="fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
        <div class="modal-title" style="margin-bottom:0">👓 ${esc(p.cliente)}</div>
        ${p.os?`<div style="text-align:right"><div style="font-size:10px;color:#888;letter-spacing:2px">ORDEM DE SERVIÇO</div><div style="font-size:22px;font-weight:bold;color:#C9A84C">#${esc(p.os)}</div></div>`:""}
      </div>
      <div class="gray" style="margin-bottom:10px">${p.data} ${p.hora||""} · por ${esc(p.funcionario)}</div>
      ${p.telefone?`<div style="margin-bottom:8px;font-size:13px">📞 ${esc(p.telefone)}</div>`:""}
      <div style="margin-bottom:10px"><span class="gold">Lente:</span> ${esc(p.tipoLenteCompleto||p.tipoBase||"—")}${p.marca?` · ${esc(p.marca)}`:""}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="receita-box"><div class="receita-title">OD</div>
          <div style="font-size:13px">ESF: ${p.od?.esf||"—"} / CIL: ${p.od?.cil||"—"}</div>
          <div style="font-size:13px">Eixo: ${p.od?.eixo||"—"} / DNP: ${p.od?.dnp||"—"}</div>
        </div>
        <div class="receita-box"><div class="receita-title">OE</div>
          <div style="font-size:13px">ESF: ${p.oe?.esf||"—"} / CIL: ${p.oe?.cil||"—"}</div>
          <div style="font-size:13px">Eixo: ${p.oe?.eixo||"—"} / DNP: ${p.oe?.dnp||"—"}</div>
        </div>
      </div>
      ${p.adicao?`<div style="margin-bottom:8px;font-size:13px">Adição: ${esc(p.adicao)}</div>`:""}
      ${p.obs?`<div style="margin-bottom:12px;font-size:13px;color:#888;font-style:italic">Obs: ${esc(p.obs)}</div>`:""}
      <div class="field"><label>Atualizar Status</label>
        <select onchange="atualizarStatus(${p.id},this.value);state.modalPedido=state.pedidos.find(x=>x.id===${p.id});render()">
          ${STATUS_LIST.map(s=>`<option value="${s}"${p.status===s?" selected":""}>${s}</option>`).join("")}
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn-gold" style="flex:1" onclick="fecharModal()">Fechar</button>
        <button onclick="imprimirOS(${p.id})" style="flex:1;background:#1A2D1A;color:#4CAF50;border:1px solid #4CAF5044;border-radius:8px;padding:13px;cursor:pointer;font-size:14px;font-weight:bold">🖨️ Imprimir O.S.</button>
      </div>
    </div>
  </div>`;
  return muralHTML+modal;
}

          <div style="display:flex;align-items:center;gap:6px;background:#0F1117;border:1px solid #C9A84C22;border-radius:20px;padding:5px 12px">
            <span style="font-size:13px">${esc(m)}</span>
            ${isAdmin()?`<button onclick="removerMarca('${esc(m)}')" style="background:none;border:none;color:#E07070;cursor:pointer;font-size:14px;padding:0;line-height:1">×</button>`:""}
          </div>`).join("")}
      </div>
    </div>`:""}

    <!-- PRODUTOS agrupados por marca (armação/solar) ou lista simples (lente/acessório) -->
    ${(estoqueFilter==="Armação"||estoqueFilter==="Solar"||(estoqueFilter==="Todos"&&marcasArm.length>0))?
      marcasArm.map(marca=>{
        const itens=filtrados.filter(p=>p.marca===marca&&p.categoria!=="Lente"&&p.categoria!=="Acessório");
        if(!itens.length)return"";
        return`<div class="card">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <div style="width:36px;height:36px;background:#0F1117;border:1px solid #C9A84C33;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px">🏷</div>
            <div>
              <div style="font-weight:bold;color:#E8E6E0">${esc(marca)}</div>
              <div style="font-size:11px;color:#666">${itens.length} modelo(s)</div>
            </div>
          </div>
          ${itens.map(p=>`
            <div style="background:#0F1117;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid ${p.estoque<=3?"#E0707033":p.estoque<=8?"#FFC10733":"#C9A84C11"}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div style="flex:1">
                  <div style="font-size:14px;font-weight:bold">${esc(p.nome)}</div>
                  <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px">
                    ${p.cor?`<span style="font-size:11px;background:#1A1D2E;padding:2px 8px;border-radius:12px;border:1px solid #C9A84C22">🎨 ${esc(p.cor)}</span>`:""}
                    ${p.material?`<span style="font-size:11px;background:#1A1D2E;padding:2px 8px;border-radius:12px;border:1px solid #C9A84C22">⬡ ${esc(p.material)}</span>`:""}
                    <span style="font-size:11px;background:#1A1D2E;padding:2px 8px;border-radius:12px;border:1px solid #C9A84C22">${esc(p.categoria)}</span>
                  </div>
                  <div style="font-size:12px;color:#888;margin-top:6px">NCM ${p.ncm||"—"} · R$ ${p.preco.toFixed(2)}</div>
                </div>
                <div style="text-align:right;margin-left:10px">
                  <div style="font-size:20px;font-weight:bold;color:${p.estoque<=3?"#E07070":p.estoque<=8?"#FFC107":"#4CAF50"}">${p.estoque}</div>
                  <div style="font-size:10px;color:#666">un.</div>
                </div>
              </div>
            </div>`).join("")}
        </div>`;
      }).join("")
    :""}

    <!-- Lentes e acessórios em lista simples -->
    ${filtrados.filter(p=>p.categoria==="Lente"||p.categoria==="Acessório").length?`
    <div class="card">
      <div class="card-title">📦 ${estoqueFilter==="Acessório"?"Acessórios":"Lentes e Acessórios"}</div>
      ${filtrados.filter(p=>p.categoria==="Lente"||p.categoria==="Acessório").map(p=>`
        <div class="item-row">
          <div>
            <div style="font-size:14px">${esc(p.nome)}</div>
            <div style="font-size:11px;color:#888">${p.categoria} · R$ ${p.preco.toFixed(2)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:bold;color:${p.estoque<=3?"#E07070":p.estoque<=8?"#FFC107":"#4CAF50"}">${p.estoque}</div>
            <div style="font-size:10px;color:#666">un.</div>
          </div>
        </div>`).join("")}
    </div>`:""}
  </div>`;
}

// ════════════════════════════════════════════════
// RENDER: HISTÓRICO
// ════════════════════════════════════════════════
function renderHistorico(){
  const{vendas}=state;
  const total=vendas.reduce((s,v)=>s+v.total,0);
  const nfBadge=(v)=>{
    if(!state.config.nfceAtivo)return"";
    if(v.nfStatus==="emitida")return`<span class="nf-badge nf-ok">✓ NFC-e</span>`;
    if(v.nfStatus==="erro")return`<span class="nf-badge nf-err" onclick="reemitirNFCe(${v.id})" style="cursor:pointer">⚠ Reemitir</span>`;
    return`<span class="nf-badge nf-pend">◌ NF Pend.</span>`;
  };
  return`<div class="page">
    <div class="page-title">Histórico de Vendas</div>
    <div class="page-sub">Total: <span class="gold">R$ ${total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</span></div>
    ${vendas.length===0?`<div class="card" style="text-align:center;padding:40px;color:#555">Nenhuma venda ainda.</div>`
    :vendas.map(v=>`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-weight:bold;font-size:15px">${esc(v.cliente)}</div>
            <div class="gray">${v.data} ${v.hora||""} · <span style="color:#C9A84C">${esc(v.funcionario)}</span></div>
            <div style="margin-top:4px">${nfBadge(v)}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;color:#C9A84C;font-weight:bold">R$ ${v.total.toFixed(2)}</div>
            ${v.desconto>0?`<div style="font-size:11px;color:#E07070">- R$ ${Number(v.desconto).toFixed(2)} desc.</div>`:""}
            <div style="font-size:11px;color:#4CAF50;background:#1A2D1A;border:1px solid #4CAF5033;border-radius:5px;padding:2px 7px;margin-top:3px">${esc(v.pagamento)}</div>
          </div>
        </div>
        ${v.temArmacao&&v.armacaoItems?.length?`
          <div class="section-header">Armação</div>
          ${v.armacaoItems.map(i=>`<div class="venda-item"><div>${esc(i.nome)}</div><div class="gold">x${i.quantidade} R$ ${i.subtotal.toFixed(2)}</div></div>`).join("")}`:""}
        ${v.temLente?`
          <div class="section-header">Lentes — ${esc(tipoLenteCompleto(v.lente||{}))}</div>
          <div style="font-size:12px;color:#888">OD: ${v.lente?.od?.esf||"—"}/${v.lente?.od?.cil||"—"} · OE: ${v.lente?.oe?.esf||"—"}/${v.lente?.oe?.cil||"—"}</div>
          <div style="font-size:13px;color:#C9A84C;margin-top:4px">R$ ${Number(v.lente?.precoLente||0).toFixed(2)}</div>`:""}
      </div>`).join("")}
  </div>`;
}

// ════════════════════════════════════════════════
// RENDER: CLIENTES
// ════════════════════════════════════════════════
function renderClientes(){
  const clientes=calcClientes();
  const{clienteDetalhe}=state;

  const listaHTML=`<div class="page">
    <div class="page-title">👥 Clientes</div>
    <div class="page-sub">${clientes.length} cliente(s) cadastrado(s)</div>
    ${clientes.length===0?`<div class="card" style="text-align:center;padding:40px;color:#555">Nenhuma venda registrada ainda.</div>`:""}
    ${clientes.map(c=>`
      <div class="card" style="cursor:pointer" onclick="abrirCliente('${esc(c.nome)}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:bold;font-size:15px">${esc(c.nome)}</div>
            <div class="gray">${c.compras.length} compra(s) · última: ${c.ultimaData||"—"}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;color:#C9A84C;font-weight:bold">R$ ${c.total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
            <div style="font-size:10px;color:#666">total gasto</div>
          </div>
        </div>
      </div>`).join("")}
  </div>`;

  if(!clienteDetalhe) return listaHTML;

  const c=clienteDetalhe;
  const tiposMap=c.compras.reduce((m,v)=>{
    if(v.temArmacao)v.armacaoItems?.forEach(i=>{m[i.categoria]=(m[i.categoria]||0)+1});
    if(v.temLente)m["Lentes"]=(m["Lentes"]||0)+1;
    return m;
  },{});

  const modal=`<div class="modal-bg" onclick="fecharClienteDetalhe()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" style="margin-bottom:2px">👤 ${esc(c.nome)}</div>
      <div class="gray" style="margin-bottom:14px">${c.compras.length} compra(s) · última em ${c.ultimaData||"—"}</div>

      <!-- Resumo -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div class="stat-card" style="padding:10px;border-left:3px solid #C9A84C">
          <div style="font-size:16px;font-weight:bold;color:#C9A84C">R$ ${c.total.toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px">Total Gasto</div>
        </div>
        <div class="stat-card" style="padding:10px;border-left:3px solid #4CAF50">
          <div style="font-size:16px;font-weight:bold">${c.compras.length}</div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px">Compras</div>
        </div>
        <div class="stat-card" style="padding:10px;border-left:3px solid #17A2B8">
          <div style="font-size:16px;font-weight:bold">R$ ${(c.total/c.compras.length).toLocaleString("pt-BR",{minimumFractionDigits:2})}</div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px">Ticket Médio</div>
        </div>
      </div>

      <!-- Categorias -->
      ${Object.keys(tiposMap).length?`
      <div style="margin-bottom:14px">
        <div style="font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">O que comprou</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${Object.entries(tiposMap).map(([k,v])=>`<span style="background:#1A1D2E;border:1px solid #C9A84C22;border-radius:20px;padding:4px 12px;font-size:12px">${esc(k)} <span class="gold">×${v}</span></span>`).join("")}
        </div>
      </div>`:""}

      <!-- Histórico de compras -->
      <div style="font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Histórico de compras</div>
      ${c.compras.map(v=>`
        <div style="background:#0F1117;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid #C9A84C11">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div class="gray">${v.data} ${v.hora||""}</div>
            <div style="font-weight:bold;color:#C9A84C">R$ ${v.total.toFixed(2)}</div>
          </div>
          <div style="font-size:12px;color:#666">${esc(v.pagamento)} · por ${esc(v.funcionario)}</div>
          ${v.temArmacao&&v.armacaoItems?.length?`<div style="font-size:12px;color:#888;margin-top:4px">🕶 ${v.armacaoItems.map(i=>esc(i.nome)).join(", ")}</div>`:""}
          ${v.temLente?`<div style="font-size:12px;color:#888;margin-top:2px">👁 Lentes: OD ${v.lente?.od?.esf||"—"}/${v.lente?.od?.cil||"—"} · OE ${v.lente?.oe?.esf||"—"}/${v.lente?.oe?.cil||"—"}</div>`:""}
        </div>`).join("")}

      <button class="btn-gold" onclick="fecharClienteDetalhe()">Fechar</button>
    </div>
  </div>`;
  return listaHTML+modal;
}

    <!-- FIREBASE -->
    <div class="card">
      <div class="card-title">☁️ Firebase — Sincronização</div>
      ${FIREBASE_PRONTO && db ? `

          <div style="font-size:24px">✅</div>
          <div>
            <div style="color:#4CAF50;font-weight:bold">Conectado à nuvem!</div>
            <div style="font-size:12px;color:#888">Dados sincronizando entre todos os dispositivos em tempo real.</div>
          </div>
        </div>` : FIREBASE_PRONTO ? `
        <div style="background:#1A2020;border:1px solid #FFC10744;border-radius:10px;padding:12px;margin-bottom:14px;color:#FFC107;font-size:13px">
          ⏳ Conectando ao Firebase...

          <div style="font-size:12px;color:#888;line-height:1.8">
            1. Acesse <strong style="color:#C9A84C">console.firebase.google.com</strong><br/>
            2. Clique em <strong style="color:#E8E6E0">Criar projeto</strong> → dê um nome → desative Google Analytics → Criar<br/>
            3. No menu lateral: <strong style="color:#E8E6E0">Firestore Database</strong> → Criar banco de dados → Modo de teste → próximo → Ativar<br/>
            4. No menu lateral: <strong style="color:#E8E6E0">Configurações do projeto</strong> (⚙️) → Seus apps → clique no ícone <strong style="color:#E8E6E0">&lt;/&gt;</strong> (Web)<br/>
            5. Registre o app → copie o objeto <code style="color:#C9A84C">firebaseConfig</code><br/>
            6. Abra o arquivo <code style="color:#C9A84C">index.html</code> no bloco de notas e cole os valores em <strong>FIREBASE_CONFIG</strong> no topo do script
          </div>
        </div>`}
    </div>
    <div class="card">
      <div class="card-title">🧾 NFC-e — Focus NFe</div>
      <div class="toggle-row" style="margin-bottom:14px">
        <div class="toggle-label">Emissão de NFC-e ativa</div>
        <label class="toggle"><input type="checkbox" ${config.nfceAtivo?"checked":""} onchange="toggleNfce(this.checked)"/><span class="slider"></span></label>
      </div>
      ${field("Token Focus NFe",`<input style="background:#0F1117;border:1px solid #C9A84C33;border-radius:8px;padding:11px 13px;color:#E8E6E0;font-size:13px;width:100%;outline:none" type="password" value="${esc(config.focusToken)}" placeholder="Token da API Focus NFe" oninput="onInp(event,'config.focusToken')"/>`)}
      ${field("CNPJ Emitente",inp("config.cnpjEmitente",config.cnpjEmitente,"00.000.000/0001-00"))}
      ${field("Razão Social",inp("config.razaoSocial",config.razaoSocial,"Nome da empresa"))}
      <div style="background:#1A1A0F;border:1px solid #C9A84C33;border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px;color:#888">
        ⚠️ URL atual: <strong style="color:#C9A84C">homologação</strong>. Para produção altere para <code>api.focusnfe.com.br</code>.
      </div>
      <button class="btn-gold" onclick="salvarConfig()">💾 Salvar Configurações</button>
    </div>
    <div class="card">
      <div class="card-title">👥 Usuários</div>
      ${USUARIOS.map(u=>`
        <div class="item-row">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,${u.cor},${u.cor}88);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff">${u.avatar}</div>
            <div><div>${u.nome}</div><div class="gray">${u.cargo}</div></div>
          </div>
          <div style="font-size:11px;color:#555">${u.senha?`🔒 senha definida`:`🔓 acesso livre`}</div>
        </div>`).join("")}
    </div>
  </div>`;
}

// RENDER: APP SHELL
// ════════════════════════════════════════════════
function renderApp(){
  const{aba,usuario}=state;
  const abas=[
    {key:"dashboard",label:"Início",  icon:"🏠"},
    {key:"venda",    label:"Venda",   icon:"💰"},
    {key:"mural",    label:"Mural",   icon:"📋"},
    {key:"clientes", label:"Clientes",icon:"👥"},
    {key:"estoque",  label:"Estoque", icon:"📦"},
    {key:"historico",label:"Histórico",icon:"🕐"},
    {key:"config",   label:"Config",  icon:"⚙️"},
  ];
  const pages={dashboard:renderDashboard,venda:renderVenda,mural:renderMural,clientes:renderClientes,estoque:renderEstoque,historico:renderHistorico,config:renderConfig};
  return`
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;background:linear-gradient(135deg,#C9A84C,#E8D08A);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px">👓</div>
        <div style="font-size:15px;font-weight:bold;color:#C9A84C;letter-spacing:1px">ÓTICA SISTEMA</div>
        <div style="font-size:10px;margin-top:1px">${FIREBASE_PRONTO&&db?'<span style="color:#4CAF50">● nuvem</span>':'<span style="color:#666">● local</span>'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,${usuario.cor},${usuario.cor}88);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;font-size:13px">${usuario.avatar}</div>
          <span style="font-size:13px">${usuario.nome}</span>
          ${isAdmin()?`<span class="badge-admin">ADMIN</span>`:""}
        </div>
        <button onclick="logout()" style="background:transparent;border:1px solid #C9A84C33;color:#888;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px">Sair</button>
      </div>
    </div>
    <div class="main-content">${(pages[aba]||renderDashboard)()}</div>
    <div class="bottom-nav">
      ${abas.map(a=>`<button class="${aba===a.key?"active":""}" onclick="setAba('${a.key}')">
        <span class="icon">${a.icon}</span><span>${a.label}</span>
      </button>`).join("")}
    </div>`;
}
